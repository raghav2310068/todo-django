{%load static%}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <title>Document</title>
  </head>
  <body>
    <div class="container">
      <h3 class="pt-5 text-center">Django To-Do App</h3>
      <div class="row">
        <h4>My Day</h4>
        <p class="text-muted">{% now "jS F Y" %}</p>
        <div class="col-md-7 col-lg-7" style="height: 450px; overflow: scroll">
          {% for task in pending_tasks %}
          <div class="card m-1">
            <div class="card-body">
              {{ task.task }}
              <span style="position: relative; float: right">
                <a
                  href="{% url 'mark_as_Done' task.pk %}"
                  class="btn btn-success btn-sm"
                  >Done</a
                >
                <a
                  href="{% url 'delete_task' task.pk %}"
                  class="btn btn-danger btn-sm"
                  >Delete</a
                >
                <a
                  href="{% url 'edit_task' task.pk %}"
                  class="btn btn-primary btn-sm"
                  >Edit</a
                >
              </span>
            </div>
          </div>
          {% endfor %}
        </div>
        <div class="col-md-5 col-lg-5">
          <h5>completed tasks</h5>
          {% for task in complete_tasks %}
          <div class="card m-1">
            <div class="card-body">{{ task.task }}</div>
            <a
              href="{% url 'mark_as_pending' task.pk %}"
              class="btn btn-primary btn-sm"
              >mark as undone</a
            >
          </div>
          {% endfor %}
        </div>
      </div>
      <div class="row">
        <div class="col-md-7 col-lg-7" style="position: absolute; bottom: 50px">
          <form action="{% url  'addTask' %}" method="post">
            {% csrf_token %}
            <div class="form-group">
              <span style="display: flex"
                ><input
                  type="text"
                  class="form-control"
                  name="task"
                  placeholder="add a task"
                />
                <button type="submit" class="btn btn-primary">Add Task</button>
              </span>
            </div>
          </form>
        </div>
      </div>
    </div>
  </body>
</html>
